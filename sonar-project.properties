# SonarCloud Configuration
# Required: Set these environment variables before running the scanner:
#   SONAR_TOKEN - Your SonarCloud authentication token
#   SONAR_HOST_URL is set to SonarCloud by default

sonar.host.url=https://sonarcloud.io

# Project identification
sonar.organization=pramudithan
sonar.projectKey=PramudithaN_fyp_frontend
sonar.projectName=FYP Frontend
sonar.projectVersion=1.0.0

# Source configuration
sonar.sources=src
sonar.sourceEncoding=UTF-8

# TypeScript / JavaScript settings
sonar.typescript.tsconfigPaths=tsconfig.json

# Exclusions - files/directories to skip during analysis
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/coverage/**,\
  **/.scannerwork/**

# Coverage report paths
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
